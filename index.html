<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CXO Assessment Assistant</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7ff;
      height: 100vh;
    }

    /* Floating Chat Button */
    .chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: white;
      border: 3px solid #4f46e5;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-toggle img {
      width: 38px;
      height: 38px;
    }

    /* Chat Window */
    .chat-window {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 400px;
      height: 650px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
      z-index: 9999;
    }

    .chat-header {
      background: #eef2ff;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      color: #1e293b;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      cursor: pointer;
      font-size: 24px;
      color: #64748b;
    }

    iframe {
      width: 100%;
      height: calc(100% - 70px);
      border: none;
    }

    @media(max-width: 500px) {
      .chat-window {
        width: 95%;
        right: 2.5%;
        height: 80vh;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Button -->
  <div class="chat-toggle" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" alt="chat">
  </div>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">

    <div class="chat-header">
      CXO Assistant
      <span class="close-btn" onclick="toggleChat()">×</span>
    </div>

    <iframe
      src="https://copilotstudio.microsoft.com/environments/3814220b-fb8e-ed34-87b7-e471f8369711/bots/cr63f_v10CXOAssessmentAgentDEV/webchat?__version__=2">
    </iframe>

  </div>

  <script>
    function toggleChat() {
      const chat = document.getElementById("chatWindow");

      if (chat.style.display === "block") {
        chat.style.display = "none";
      } else {
        chat.style.display = "block";
      }
    }
  </script>

</body>
</html>
