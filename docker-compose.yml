version: '3.8'

services:
  drupal:
    image: drupal:10
    container_name: drupal_app
    ports:
      - "8080:80"
    volumes:
      - drupal_data:/var/www/html
      - ./themes:/var/www/html/themes/custom 
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: drupal_db
    restart: always
    environment:
      MYSQL_DATABASE: drupal_cxo
      MYSQL_USER: drupal_cxo_user
      MYSQL_PASSWORD: Cxo@123 
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: drupal_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  drupal_data:
  db_data: